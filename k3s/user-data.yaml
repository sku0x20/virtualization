#cloud-config

users:
  - name: alpine
    plain_text_passwd: "alpine"
    lock_passwd: false
    doas:
      - "permit nopass alpine"

chpasswd:
  users:
    - name: root
      password: root
      type: text
  expire: false

ssh_pwauth: false

packages:
  - curl
  - iptables

write_files:
  - path: /etc/modules-load.d/k3s.conf
    content: |
      br_netfilter
      overlay
      ip_tables
  - path: /etc/sysctl.d/k3s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

runcmd:
  - sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT="\(.*\)"/GRUB_CMDLINE_LINUX_DEFAULT="\1 cgroup_memory=1 cgroup_enable=memory"/' /etc/default/grub
  - grub-mkconfig -o /boot/grub/grub.cfg
  - modprobe br_netfilter
  - modprobe overlay
  - modprobe ip_tables
  - sysctl -p /etc/sysctl.d/k3s.conf
  - swapoff -a
  - sed -i '/ swap / d' /etc/fstab

power_state:
  mode: reboot
